<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechShop - Commande</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">TechShop</div>
            <ul class="nav-links">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="produits.html">Produits</a></li>
                <li><a href="commande.html" class="active">Commande</a></li>
                <li><a href="connexion.html">Connexion</a></li>
                <li><a href="inscription.html">Inscription</a></li>
            </ul>
            <div class="burger">☰</div>
        </nav>
    </header>

    <main>
        <section class="order-section">
            <h1>Passer commande</h1>
            
            <div class="order-container">
                <div class="cart-section">
                    <h2>Votre panier</h2>
                    <div id="cartItems">
                        <p class="empty-cart">Votre panier est vide. Ajoutez des produits depuis la page Produits.</p>
                    </div>
                    <div class="cart-total">
                        <strong>Total : </strong><span id="cartTotal">0 €</span>
                    </div>
                </div>

                <div class="delivery-section">
                    <h2>Informations de livraison</h2>
                    <form id="orderForm">
                        <div class="form-group">
                            <label for="adresse">Adresse complète :</label>
                            <textarea id="adresse" name="adresse" rows="3" required></textarea>
                            <small class="error-message" id="adresseError"></small>
                        </div>

                        <div class="form-group">
                            <label for="codePostal">Code postal :</label>
                            <input type="text" id="codePostal" name="codePostal" required>
                            <small class="error-message" id="codePostalError"></small>
                        </div>

                        <div class="form-group">
                            <label for="ville">Ville :</label>
                            <input type="text" id="ville" name="ville" required>
                            <small class="error-message" id="villeError"></small>
                        </div>

                        <button type="submit" class="btn" id="validateOrderBtn">Confirmer la commande</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechShop - Tous droits réservés</p>
    </footer>

    <script src="../javascript/script.js"></script>
</body>
</html>

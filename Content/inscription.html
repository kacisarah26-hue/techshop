<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechShop - Inscription</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">TechShop</div>
            <ul class="nav-links">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="produits.html">Produits</a></li>
                <li><a href="commande.html">Commande</a></li>
                <li><a href="connexion.html">Connexion</a></li>
                <li><a href="inscription.html" class="active">Inscription</a></li>
            </ul>
            <div class="burger">☰</div>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h1>Créer un compte</h1>
            <form id="inscriptionForm">
                <div class="form-group">
                    <label for="nom">Nom complet :</label>
                    <input type="text" id="nom" name="nom" required>
                    <small class="error-message" id="nomError"></small>
                </div>

                <div class="form-group">
                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" required>
                    <small class="error-message" id="emailError"></small>
                </div>

                <div class="form-group">
                    <label for="telephone">Téléphone :</label>
                    <input type="tel" id="telephone" name="telephone" required>
                    <small class="error-message" id="telError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe :</label>
                    <input type="password" id="password" name="password" required>
                    <small class="error-message" id="passwordError"></small>
                    <small class="info">Minimum 8 caractères, 1 majuscule, 1 chiffre</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmer mot de passe :</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <small class="error-message" id="confirmError"></small>
                </div>

                <button type="submit" class="btn">S'inscrire</button>
                <p class="form-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechShop - Tous droits réservés</p>
    </footer>

    <script src="../javascript/script.js"></script>
</body>
</html>
